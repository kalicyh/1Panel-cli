name: Release Rust MUSL Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-musl-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_name: 1panel-cli-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            asset_name: 1panel-cli-aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build MUSL binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --locked --manifest-path rust/1panel-cli/Cargo.toml --bin 1panel-cli"

      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/1panel-cli ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          find dist -type f -maxdepth 2 -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/**/1panel-cli-*
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
